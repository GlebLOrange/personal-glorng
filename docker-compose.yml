# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json
services:
  db:
    image: postgres:17.4-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --forwarded-allow-ips="*"
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_media:/app/media
    environment:
      PYTHONPATH: /app
      RUN_MIGRATIONS: "true"
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./server/requirements.txt

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: python -m app.workers.run app.workers.WorkerSettings
    restart: unless-stopped
    volumes:
      - ./server:/app
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./server/requirements.txt

  todobot:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: python -m app.todobot.main
    restart: unless-stopped
    volumes:
      - ./server:/app
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./server/requirements.txt

  client:
    build: ./client
    restart: unless-stopped
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    networks:
      - frontend
    depends_on:
      - server
    develop:
      watch:
        - action: rebuild
          path: ./client/package.json

  nginx:
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/http_common.conf:/etc/nginx/http_common.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - server_media:/app/media:ro
    networks:
      - frontend
      - backend
    depends_on:
      server:
        condition: service_started
      client:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./nginx
          target: /etc/nginx

volumes:
  pgdata:
  redis_data:
  server_media:
  client_node_modules:

networks:
  frontend:
  backend:
