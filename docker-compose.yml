# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json
services:
  db:
    image: postgres:18.4-alpine
    restart: unless-stopped
    command: postgres -c shared_buffers=128MB -c max_connections=50
    ports:
      - "127.0.0.1:5433:5432"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./server/app/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "/app/scripts/db_init.sh"]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --forwarded-allow-ips="127.0.0.1"
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
      - server_media:/app/media
    environment:
      PYTHONPATH: /app
      RUN_MIGRATIONS: "true"
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  worker:
    profiles:
      - worker
    build:
      context: ./server
      dockerfile: Dockerfile
    command: python -m app.workers.run app.workers.WorkerSettings
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  todobot:
    profiles:
      - bot
    build:
      context: ./server
      dockerfile: Dockerfile
    command: python -m app.todobot.main
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  client:
    build: ./client
    restart: unless-stopped
    environment:
      VITE_BEHIND_NGINX: "true"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    networks:
      - frontend
    depends_on:
      - server
    develop:
      watch:
        - action: rebuild
          path: ./client/package.json

  nginx:
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/http_common.conf:/etc/nginx/http_common.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - server_media:/app/media:ro
    networks:
      - frontend
      - backend
    depends_on:
      server:
        condition: service_started
      client:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./nginx
          target: /etc/nginx

volumes:
  pgdata:
  redis_data:
  server_venv:
  server_media:
  client_node_modules:

networks:
  frontend:
  backend:
