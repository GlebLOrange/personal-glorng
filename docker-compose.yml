# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json
services:
  db:
    image: postgres:18.4-alpine
    profiles:
      - postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=128MB -c max_connections=50
    ports:
      - "127.0.0.1:5433:5432"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./server/app/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.1.3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/celery-compat.conf:/etc/rabbitmq/conf.d/10-celery-compat.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:9.3.5
    profiles:
      - search
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:8.0.9
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2.3-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 64mb
      --maxmemory-policy noeviction
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "/app/scripts/db_init.sh"]
    volumes:
      - ./.env:/run/glorng/.env:ro
    environment:
      PYTHONPATH: /app
      GLORNG_ENV_FILE: /run/glorng/.env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --forwarded-allow-ips="127.0.0.1"
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
      - server_media:/app/media
      - ./.env:/run/glorng/.env:ro
    environment:
      PYTHONPATH: /app
      GLORNG_ENV_FILE: /run/glorng/.env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  worker:
    profiles:
      - worker
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    command: celery -A app.workers.celery_app worker --loglevel=info -Q celery
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
      - ./.env:/run/glorng/.env:ro
    environment:
      PYTHONPATH: /app
      GLORNG_ENV_FILE: /run/glorng/.env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  beat:
    profiles:
      - worker
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
      - ./.env:/run/glorng/.env:ro
    environment:
      PYTHONPATH: /app
      GLORNG_ENV_FILE: /run/glorng/.env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  todobot:
    profiles:
      - bot
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    command: python -m app.todobot.main
    restart: unless-stopped
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
      - ./.env:/run/glorng/.env:ro
    environment:
      PYTHONPATH: /app
      GLORNG_ENV_FILE: /run/glorng/.env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./server/pyproject.toml
        - action: rebuild
          path: ./server/uv.lock

  client:
    build: ./client
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://server:8000
      VITE_BEHIND_NGINX: "true"
      VITE_AI_SEARCH_ENABLED: ${VITE_AI_SEARCH_ENABLED:-false}
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    networks:
      - frontend
    depends_on:
      - server
    develop:
      watch:
        - action: rebuild
          path: ./client/package.json

  nginx:
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/http_common.conf:/etc/nginx/http_common.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./nginx/proxy_sse_params.conf:/etc/nginx/proxy_sse_params.conf:ro
      - ./nginx/locations.conf:/etc/nginx/locations.conf:ro
      - server_media:/app/media:ro
    networks:
      - frontend
      - backend
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync+restart
          path: ./nginx
          target: /etc/nginx

volumes:
  pgdata:
  es_data:
  mongo_data:
  rabbitmq_data:
  redis_data:
  server_venv:
  server_media:
  client_node_modules:

networks:
  frontend:
  backend:
