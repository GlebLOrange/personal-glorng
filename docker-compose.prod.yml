# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json
services:
  db:
    image: postgres:18.4-alpine
    profiles:
      - postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./server/app/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.1.3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/celery-compat.conf:/etc/rabbitmq/conf.d/10-celery-compat.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8.0.9
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2.3-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "/app/scripts/db_init.sh"]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --forwarded-allow-ips="127.0.0.1"
    restart: unless-stopped
    volumes:
      - server_media:/app/media
    environment:
      PYTHONPATH: /app
      RUN_MIGRATIONS: "false"
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  todobot:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: python -m app.todobot.main
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    restart: "no"
    volumes:
      - client_dist:/usr/share/nginx/html

  nginx:
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/http_common.conf:/etc/nginx/http_common.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./nginx/proxy_sse_params.conf:/etc/nginx/proxy_sse_params.conf:ro
      - server_media:/app/media:ro
      - client_dist:/usr/share/nginx/html:ro
    networks:
      - frontend
      - backend
    depends_on:
      client:
        condition: service_completed_successfully
      server:
        condition: service_started

volumes:
  pgdata:
  mongo_data:
  rabbitmq_data:
  redis_data:
  server_media:
  client_dist:

networks:
  frontend:
  backend:
