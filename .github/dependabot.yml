version: 2
updates:
  - package-ecosystem: uv
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: production
        update-types: [minor, patch]
      npm-dev:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      docs-npm:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
