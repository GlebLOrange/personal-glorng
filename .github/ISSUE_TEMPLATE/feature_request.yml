name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work from a user perspective?
    validations:
      required: true

  - type: dropdown
    id: pillar
    attributes:
      label: Platform pillar (if applicable)
      options:
        - Productivity (tasks, email, expenses)
        - Content (recipes, file share, URL shortener)
        - Utilities (calculator, video download, AI chat)
        - Operations (feedback, audit)
        - Public site / portfolio
        - Infrastructure / DevOps
        - Not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
