name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

# P0 PR gate — fast tests on every pull request (see docs/reference/testing.md).
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "server/uv.lock"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff and Mypy checks
        run: |
          uv run ruff check . & ruff_check_pid=$!
          uv run ruff format --check . & ruff_format_pid=$!
          uv run mypy app & mypy_pid=$!
          wait "$ruff_check_pid"; ruff_check_exit=$?
          wait "$ruff_format_pid"; ruff_format_exit=$?
          wait "$mypy_pid"; mypy_exit=$?
          exit $((ruff_check_exit || ruff_format_exit || mypy_exit))
      - name: Pytest (P0 — exclude integration tier)
        env:
          GLORNG_ENV_FILE: ${{ github.workspace }}/server/tests/.env.test
        run: uv run pytest -m "not integration" -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Lint and format check
        run: |
          npm run lint & lint_pid=$!
          npm run format:check & format_pid=$!
          wait "$lint_pid"; lint_exit=$?
          wait "$format_pid"; format_exit=$?
          exit $((lint_exit || format_exit))
      - run: npm run test
      - run: npm run build:check
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  # P1 postgres paths — audit/search dual-write (see docs/reference/testing.md).
  postgres-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: glorng
          POSTGRES_PASSWORD: glorng_ci
          POSTGRES_DB: glorng
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glorng -d glorng"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "server/uv.lock"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Alembic migrations
        env:
          GLORNG_ENV_FILE: ${{ github.workspace }}/server/tests/.env.postgres
        run: uv run alembic upgrade head
      - name: Postgres integration tests (P1)
        env:
          GLORNG_ENV_FILE: ${{ github.workspace }}/server/tests/.env.postgres
        run: uv run pytest -m postgres -v

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist
      - name: Write CI env file
        run: |
          cp server/tests/env/ci-docker.env .env
          sed -i 's/^RUN_SEED=.*/RUN_SEED=true/' .env
      - name: Start API stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d redis mongodb
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build migrate server
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d server
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Get Playwright version
        id: playwright-version
        working-directory: client
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Playwright smoke tests
        working-directory: client
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8000
          E2E_EMAIL: admin@admin.admin
          E2E_PASSWORD: MyTestPass123!
        run: |
          VITE_API_PROXY_TARGET=http://127.0.0.1:8000 npm run preview &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ >/dev/null && break
            sleep 2
          done
          npm run e2e
          kill $PREVIEW_PID

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      - run: npm run build
