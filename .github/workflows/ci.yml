name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ENABLE_MONGODB: "true"
  ENABLE_POSTGRES: "false"
  MONGODB_USER: glorng
  MONGODB_PASSWORD: glorng_ci_mongodb_123
  MONGODB_DB: glorng
  MONGODB_URL: mongodb://glorng:glorng_ci_mongodb_123@mongodb:27017/glorng?authSource=admin
  POSTGRES_USER: glorng
  POSTGRES_PASSWORD: glorng_ci
  POSTGRES_DB: glorng
  DATABASE_URL: postgresql+asyncpg://glorng:glorng_ci@db:5432/glorng
  REDIS_PASSWORD: glorng_ci_redis
  REDIS_URL: redis://:glorng_ci_redis@redis:6379/0
  RABBITMQ_USER: glorng
  RABBITMQ_PASSWORD: glorng_ci_rabbitmq
  CELERY_BROKER_URL: amqp://glorng:glorng_ci_rabbitmq@rabbitmq:5672//
  JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
  ALLOWED_EMAIL: admin@glorng.dev
  SEED_PASSWORD: MyTestPass123!
  APP_ENV: development
  EMAIL_BACKEND: console

# P0 PR gate — fast tests on every pull request (see docs/testing.md).
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pytest (P0 — exclude integration tier)
        env:
          APP_ENV: test
          ENABLE_MONGODB: "true"
          ENABLE_POSTGRES: "false"
          MONGODB_URL: mongodb://127.0.0.1:27017
          MONGODB_DB: test_glorng
          REDIS_URL: redis://:local@127.0.0.1:6379/0
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
        run: uv run pytest -m "not integration" -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

  # P1 postgres paths — audit/search dual-write (see docs/testing.md).
  postgres-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: glorng
          POSTGRES_PASSWORD: glorng_ci
          POSTGRES_DB: glorng
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glorng -d glorng"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://glorng:glorng_ci@localhost:5432/glorng
          ENABLE_POSTGRES: "true"
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
        run: uv run alembic upgrade head
      - name: Postgres integration tests (P1)
        env:
          POSTGRES_TEST_URL: postgresql+asyncpg://glorng:glorng_ci@localhost:5432/glorng
          DATABASE_URL: postgresql+asyncpg://glorng:glorng_ci@localhost:5432/glorng
          ENABLE_POSTGRES: "true"
          REDIS_URL: redis://:local@127.0.0.1:6379/0
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
        run: uv run pytest -m postgres -v

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write CI env file
        run: |
          cat > .env <<'EOF'
          ENABLE_MONGODB=true
          ENABLE_POSTGRES=false
          MONGODB_USER=glorng
          MONGODB_PASSWORD=glorng_ci_mongodb_123
          MONGODB_DB=glorng
          MONGODB_URL=mongodb://glorng:glorng_ci_mongodb_123@mongodb:27017/glorng?authSource=admin
          REDIS_PASSWORD=glorng_ci_redis
          REDIS_URL=redis://:glorng_ci_redis@redis:6379/0
          RABBITMQ_USER=glorng
          RABBITMQ_PASSWORD=glorng_ci_rabbitmq
          CELERY_BROKER_URL=amqp://glorng:glorng_ci_rabbitmq@rabbitmq:5672//
          JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
          ALLOWED_EMAIL=admin@glorng.dev
          SEED_PASSWORD=MyTestPass123!
          APP_ENV=development
          EMAIL_BACKEND=console
          EOF
      - name: Start database and migrate
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d redis mongodb
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --build migrate

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Write CI env file
        run: |
          cat > .env <<'EOF'
          ENABLE_MONGODB=true
          ENABLE_POSTGRES=false
          MONGODB_USER=glorng
          MONGODB_PASSWORD=glorng_ci_mongodb_123
          MONGODB_DB=glorng
          MONGODB_URL=mongodb://glorng:glorng_ci_mongodb_123@mongodb:27017/glorng?authSource=admin
          REDIS_PASSWORD=glorng_ci_redis
          REDIS_URL=redis://:glorng_ci_redis@redis:6379/0
          RABBITMQ_USER=glorng
          RABBITMQ_PASSWORD=glorng_ci_rabbitmq
          CELERY_BROKER_URL=amqp://glorng:glorng_ci_rabbitmq@rabbitmq:5672//
          JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
          ALLOWED_EMAIL=admin@glorng.dev
          SEED_PASSWORD=MyTestPass123!
          APP_ENV=development
          EMAIL_BACKEND=console
          EOF
      - name: Start API stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d redis mongodb
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --build -e RUN_SEED=true migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build server
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Install Playwright
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Build client
        working-directory: client
        run: npm run build
      - name: Playwright smoke tests
        working-directory: client
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8000
          E2E_EMAIL: admin@glorng.dev
          E2E_PASSWORD: MyTestPass123!
        run: |
          VITE_API_PROXY_TARGET=http://127.0.0.1:8000 npm run preview &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ >/dev/null && break
            sleep 2
          done
          npm run e2e
          kill $PREVIEW_PID
