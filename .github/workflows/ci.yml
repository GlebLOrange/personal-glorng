name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# P0 PR gate — fast tests on every pull request (see docs/testing.md).
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pytest (P0 — exclude integration tier)
        env:
          GLORNG_ENV_FILE: ${{ github.workspace }}/server/tests/.env.test
        run: uv run pytest -m "not integration" -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

  # P1 postgres paths — audit/search dual-write (see docs/testing.md).
  postgres-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: glorng
          POSTGRES_PASSWORD: glorng_ci
          POSTGRES_DB: glorng
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glorng -d glorng"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Alembic migrations
        env:
          GLORNG_ENV_FILE: ${{ github.workspace }}/server/tests/.env.postgres
        run: uv run alembic upgrade head
      - name: Postgres integration tests (P1)
        env:
          GLORNG_ENV_FILE: ${{ github.workspace }}/server/tests/.env.postgres
        run: uv run pytest -m postgres -v

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write CI env file
        run: cp server/tests/env/ci-docker.env .env
      - name: Start database and migrate
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d redis mongodb
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --build migrate

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Write CI env file
        run: |
          cp server/tests/env/ci-docker.env .env
          sed -i 's/^RUN_SEED=.*/RUN_SEED=true/' .env
      - name: Start API stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d redis mongodb
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --build migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build server
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Install Playwright
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Build client
        working-directory: client
        run: npm run build
      - name: Playwright smoke tests
        working-directory: client
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8000
          E2E_EMAIL: admin@glorng.dev
          E2E_PASSWORD: MyTestPass123!
        run: |
          VITE_API_PROXY_TARGET=http://127.0.0.1:8000 npm run preview &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ >/dev/null && break
            sleep 2
          done
          npm run e2e
          kill $PREVIEW_PID
