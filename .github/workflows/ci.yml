name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  POSTGRES_USER: glorng
  POSTGRES_PASSWORD: glorng_ci
  POSTGRES_DB: glorng
  DATABASE_URL: postgresql+asyncpg://glorng:glorng_ci@db:5432/glorng
  REDIS_PASSWORD: glorng_ci_redis
  REDIS_URL: redis://:glorng_ci_redis@redis:6379/0
  JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
  ALLOWED_EMAIL: admin@glorng.dev
  SEED_PASSWORD: testpass123
  APP_ENV: development
  EMAIL_BACKEND: console

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://:local@127.0.0.1:6379/0
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
        run: uv run pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write CI env file
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=glorng
          POSTGRES_PASSWORD=glorng_ci
          POSTGRES_DB=glorng
          DATABASE_URL=postgresql+asyncpg://glorng:glorng_ci@db:5432/glorng
          REDIS_PASSWORD=glorng_ci_redis
          REDIS_URL=redis://:glorng_ci_redis@redis:6379/0
          JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
          ALLOWED_EMAIL=admin@glorng.dev
          SEED_PASSWORD=testpass123
          APP_ENV=development
          EMAIL_BACKEND=console
          EOF
      - name: Start database and migrate
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d db redis
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --build migrate
      - name: Alembic check
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --no-deps server alembic check

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - name: Write CI env file
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=glorng
          POSTGRES_PASSWORD=glorng_ci
          POSTGRES_DB=glorng
          DATABASE_URL=postgresql+asyncpg://glorng:glorng_ci@db:5432/glorng
          REDIS_PASSWORD=glorng_ci_redis
          REDIS_URL=redis://:glorng_ci_redis@redis:6379/0
          JWT_SECRET=ci-jwt-secret-at-least-32-characters-long
          ALLOWED_EMAIL=admin@glorng.dev
          SEED_PASSWORD=testpass123
          APP_ENV=development
          EMAIL_BACKEND=console
          EOF
      - name: Start API stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d db redis
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --build migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build server
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T server python scripts/ensure_e2e_user.py
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Playwright smoke tests
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8000
          E2E_EMAIL: admin@glorng.dev
          E2E_PASSWORD: testpass123
        run: |
          VITE_API_PROXY_TARGET=http://127.0.0.1:8000 npm run preview &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ >/dev/null && break
            sleep 2
          done
          npm run e2e
          kill $PREVIEW_PID
