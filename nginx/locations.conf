# Shared API / utility location blocks — included by nginx.conf, nginx.prod.conf,
# and nginx.dev-lite.conf.  The $upstream_server variable must be defined by
# the enclosing server block (e.g. `set $upstream_server server;`).

location = /sitemap.xml {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
}

location = /robots.txt {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
}

location /amp {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
}

location /api/tools/ai-chat {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_sse_params.conf;
}

location = /api/resume/pdf {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 180s;
}

location /api {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
    client_max_body_size 100m;
}

location /s/ {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
}

location /f/ {
    proxy_pass http://$upstream_server:8000;
    include /etc/nginx/proxy_params.conf;
}

location /media/shares/ {
    return 404;
}

location /media/ {
    alias /app/media/;
    expires 30d;
    include /etc/nginx/security_headers.conf;
    add_header Cache-Control "public, immutable";
}
