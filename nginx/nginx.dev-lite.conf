events {
    worker_connections 1024;
}

http {
    include /etc/nginx/http_common.conf;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        include /etc/nginx/security_headers.conf;

        # Host Vite (`make dev-lite-client`); Docker client is not started in dev-lite.
        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            include /etc/nginx/proxy_params.conf;
        }

        location = /sitemap.xml {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location = /robots.txt {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location /amp {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/search/chat {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_sse_params.conf;
        }

        location /api/tools/ai-chat {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_sse_params.conf;
        }

        location /api {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_params.conf;
            client_max_body_size 100m;
        }

        location /s/ {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location /f/ {
            set $upstream_server server;
            proxy_pass http://$upstream_server:8000;
            include /etc/nginx/proxy_params.conf;
        }

        location /media/shares/ {
            return 404;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            include /etc/nginx/security_headers.conf;
            add_header Cache-Control "public, immutable";
        }
    }
}
