events {
    worker_connections 1024;
}

http {
    include /etc/nginx/http_common.conf;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        include /etc/nginx/security_headers.conf;

        error_page 502 @dev_lite_no_vite;

        location @dev_lite_no_vite {
            default_type text/html;
            return 502 '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>gLOrng dev-lite</title></head><body style="font-family:system-ui,sans-serif;max-width:40rem;margin:3rem auto;padding:0 1rem"><h1>Vite is not running</h1><p><code>make dev-lite</code> starts the API and nginx only. The frontend is served from host Vite on port 3000.</p><p>Run in another terminal:</p><pre style="background:#f4f4f5;padding:1rem;border-radius:.5rem">make dev-lite-client</pre><p>Then open <a href="http://localhost">http://localhost</a> or <a href="http://localhost:3000">http://localhost:3000</a>.</p><p>API health: <a href="/api/health">/api/health</a></p></body></html>';
        }

        # Host Vite (`make dev-lite-client`); Docker client is not started in dev-lite.
        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            include /etc/nginx/proxy_params.conf;
        }

        set $upstream_server server;
        include /etc/nginx/locations.conf;
    }
}
