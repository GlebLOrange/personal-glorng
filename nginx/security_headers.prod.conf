add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Production can use bundled scripts; keep inline styles until component/runtime
# style attributes are audited separately.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: https://fastapi.tiangolo.com https://i.scdn.co https://www.themealdb.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.ingest.sentry.io https://*.sentry.io https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://fonts.googleapis.com https://fonts.gstatic.com ws: wss:; frame-src 'self' https://open.spotify.com https://*.spotify.com; child-src 'self' https://open.spotify.com https://*.spotify.com;" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
